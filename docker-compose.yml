services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./api:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./api:/var/www
    working_dir: /var/www
    command: php artisan queue:work
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"